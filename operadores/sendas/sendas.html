<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sendas Turismo — Programas | BestWay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:       #2d3a6b;
      --navy-dark:  #1e2748;
      --navy-mid:   #3d4f8a;
      --accent:     #4a5faa;
      --gold:       #c8a84b;
      --gold-lt:    #e8c96a;
      --teal:       #0e7a6a;
      --white:      #ffffff;
      --off-white:  #f4f3ef;
      --gray-light: #eeedf0;
      --gray:       #9a98a8;
      --text:       #1a1a2e;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--off-white); color:var(--text); min-height:100vh; }

    /* HEADER */
    header { background:var(--navy-dark); border-bottom:3px solid var(--gold); }
    .header-inner {
      max-width:1140px; margin:0 auto; padding:16px 32px;
      display:flex; align-items:center; gap:20px;
    }
    .back-btn {
      display:flex; align-items:center; gap:6px;
      color:rgba(255,255,255,.55); text-decoration:none;
      font-size:.8rem; font-weight:500; transition:color .2s; white-space:nowrap;
    }
    .back-btn:hover { color:var(--gold); }
    .back-btn svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
    .h-div { width:1px; height:36px; background:rgba(255,255,255,.12); }
    .logo-wrap img { height:40px; width:auto; display:block; }

    /* Logo Sendas encima del sidebar */
    .sidebar-logo {
      background: var(--navy-dark);
      padding: 16px 18px 12px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 2px solid var(--gold);
    }
    .sidebar-logo img {
      height: 44px; width: auto; max-width: 180px;
      object-fit: contain;
      /* Sin filter — el logo_sendas.png tiene sus propios colores */
    }
    .header-title {
      font-family:'Poppins',sans-serif; font-size:.95rem; font-weight:600; color:white;
    }
    .header-title span { color:var(--gold-lt); font-weight:400; font-size:.82rem; margin-left:6px; }

    /* UPDATE BAR */
    .update-bar {
      background:var(--teal); padding:8px 32px;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
    }
    .update-info { font-size:.75rem; color:rgba(255,255,255,.8); display:flex; align-items:center; gap:6px; }
    .update-info strong { color:white; }
    .btn-update {
      background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
      color:white; padding:5px 16px; border-radius:5px;
      font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:600;
      cursor:pointer; display:flex; align-items:center; gap:6px;
      transition:background .2s; text-decoration:none; white-space:nowrap;
    }
    .btn-update:hover { background:rgba(255,255,255,.25); }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { display:inline-block; animation:spin 1s linear infinite; }

    /* LAYOUT */
    .layout {
      max-width:1140px; margin:28px auto 64px; padding:0 32px;
      display:grid; grid-template-columns:240px 1fr; gap:28px; align-items:start;
    }

    /* SIDEBAR */
    .sidebar {
      background:var(--white); border-radius:10px;
      border:1px solid rgba(30,39,72,.09);
      box-shadow:0 2px 10px rgba(30,39,72,.05);
      overflow:hidden; position:sticky; top:16px;
    }
    .sidebar-hd {
      background:var(--navy); padding:13px 18px;
      color:white; font-size:.72rem; font-weight:600;
      letter-spacing:.1em; text-transform:uppercase;
    }
    .tree { padding:8px 0 4px; }

    .tree-country {
      padding:10px 18px 5px; font-size:.67rem; font-weight:700;
      letter-spacing:.12em; text-transform:uppercase; color:var(--gray);
      display:flex; align-items:center; gap:8px;
    }
    .tree-country::after { content:''; flex:1; height:1px; background:var(--gray-light); }

    .tree-dest-hd {
      padding:6px 18px; font-size:.82rem; font-weight:600; color:var(--navy);
      cursor:pointer; display:flex; align-items:center; gap:7px;
      transition:background .12s; user-select:none;
    }
    .tree-dest-hd:hover { background:var(--gray-light); }
    .tree-dest-hd .chev {
      margin-left:auto; width:13px; height:13px;
      fill:none; stroke:var(--gray); stroke-width:2;
      stroke-linecap:round; stroke-linejoin:round; transition:transform .18s;
    }
    .tree-dest.open .chev { transform:rotate(90deg); }
    .tree-links { display:none; padding:0 0 3px 34px; }
    .tree-dest.open .tree-links { display:block; }
    .tree-link {
      display:block; padding:4px 12px 4px 10px;
      font-size:.75rem; color:var(--accent); text-decoration:none;
      border-left:2px solid var(--gray-light); margin:1px 0; line-height:1.35;
      transition:border-color .12s,color .12s;
    }
    .tree-link:hover { color:var(--navy); border-color:var(--gold); }

    /* CONTENT */
    .content { display:flex; flex-direction:column; gap:32px; }

    .country-block { display:flex; flex-direction:column; gap:24px; }

    .country-label {
      font-family:'Poppins',sans-serif; font-size:1rem; font-weight:700; color:var(--navy);
      display:flex; align-items:center; gap:10px;
      padding-bottom:9px; border-bottom:2px solid var(--navy);
    }
    .country-label::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(90deg,var(--gold) 0%,transparent 80%); margin-top:1px;
    }

    .dest-block { display:flex; flex-direction:column; gap:7px; }

    .dest-label {
      display:flex; align-items:center; gap:10px;
      padding-bottom:8px; border-bottom:1px solid var(--gray-light);
    }
    .dest-icon {
      width:32px; height:32px; background:var(--navy); border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:.95rem; flex-shrink:0;
    }
    .dest-label h3 { font-family:'Poppins',sans-serif; font-size:.95rem; font-weight:600; color:var(--navy); }
    .dest-count {
      margin-left:auto; font-size:.68rem; color:var(--gray);
      background:var(--gray-light); padding:2px 9px; border-radius:12px;
    }

    /* CARDS */
    .prog-list { display:flex; flex-direction:column; gap:6px; }

    .prog-card {
      background:var(--white); border-radius:8px;
      border:1px solid rgba(30,39,72,.08); padding:12px 15px;
      display:flex; align-items:center; gap:14px;
      text-decoration:none; color:inherit;
      box-shadow:0 1px 3px rgba(30,39,72,.05);
      transition:border-color .18s,box-shadow .18s,transform .14s;
    }
    .prog-card:hover {
      border-color:var(--accent); box-shadow:0 3px 14px rgba(45,58,107,.11);
      transform:translateX(3px);
    }
    .card-body { flex:1; min-width:0; }
    .card-name { font-size:.88rem; font-weight:600; color:var(--navy); line-height:1.3; }
    .card-sub  { font-size:.73rem; color:var(--gray); margin-top:2px; }
    .card-tags { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
    .tag { font-size:.67rem; font-weight:500; padding:1px 7px; border-radius:10px; letter-spacing:.02em; }
    .tag-dur  { background:#e8edf8; color:var(--navy-mid); }
    .tag-bus  { background:#e8f5f0; color:#0e6a5a; }
    .tag-seas { background:#fdf5e4; color:#8a6010; }

    .card-arrow {
      width:27px; height:27px; background:var(--gray-light); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:background .18s;
    }
    .prog-card:hover .card-arrow { background:var(--navy); }
    .card-arrow svg {
      width:11px; height:11px; fill:none; stroke:var(--navy);
      stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:stroke .18s;
    }
    .prog-card:hover .card-arrow svg { stroke:white; }

    /* STATES */
    .state-box {
      text-align:center; padding:48px 20px; color:var(--gray);
      background:var(--white); border-radius:10px; border:1px solid rgba(30,39,72,.08);
    }
    .state-box .ico { font-size:1.8rem; display:block; margin-bottom:10px; }
    .state-box p { font-size:.84rem; line-height:1.7; }
    .state-box code { background:#eee; padding:1px 6px; border-radius:3px; font-size:.78rem; }

    /* FOOTER */
    footer { background:var(--navy-dark); padding:16px 32px; text-align:center; }
    footer p { color:rgba(255,255,255,.28); font-size:.74rem; }
    footer span { color:var(--gold); }

    /* RESPONSIVE */
    @media (max-width:740px) {
      .layout { grid-template-columns:1fr; padding:0 16px; }
      .sidebar { position:static; }
      .header-inner,.update-bar { padding-left:16px; padding-right:16px; }
      .update-bar { flex-direction:column; align-items:flex-start; gap:8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../../index.html" class="back-btn">
      <svg viewBox="0 0 16 16"><path d="M10 3L5 8l5 5"/></svg>
      Inicio
    </a>
    <div class="h-div"></div>
    <div class="logo-wrap"><img src="images/logo_Bestway_blanco.png" alt="BestWay"></div>
    <div class="header-title">
      Sendas Turismo
      <span>— Programas terrestres</span>
    </div>
  </div>
</header>

<div class="update-bar">
  <div class="update-info">
    🔄 Actualizado: <strong id="last-update">—</strong>
    &nbsp;·&nbsp; <span id="prog-count">—</span> programas activos
  </div>
  <a id="btn-update"
     href="https://github.com/mpanizzi-bestway/Salidas_Terrestres/actions/workflows/scrape-sendas.yml"
     target="_blank"
     class="btn-update"
     title="Abre GitHub Actions para forzar re-scraping">
    ⚡ Actualizar ahora
  </a>
</div>

<div class="layout">

  <aside class="sidebar">
    <!-- Logo Sendas sobre el árbol -->
    <div class="sidebar-logo">
      <img
        src="images/logo_sendas.png"
        alt="Sendas Turismo"
        onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<span style=\'color:white;font-weight:700;font-size:.9rem;\'>Sendas Turismo</span>')"
      >
    </div>
    <div class="sidebar-hd">Destinos &amp; Programas</div>
    <div class="tree" id="sidebar-tree">
      <div style="padding:20px 16px;text-align:center;color:var(--gray);font-size:.8rem;">
        <span class="spin">⏳</span> Cargando...
      </div>
    </div>
  </aside>

  <main class="content" id="main-content">
    <div class="state-box">
      <span class="ico spin">⏳</span>
      <p>Cargando programas...</p>
    </div>
  </main>

</div>

<footer>
  <p><span>BestWay Viajes</span> · Sendas Turismo · Uso interno</p>
</footer>

<script>
const DATA_URL = '../../programas-sendas.json';
const PROG_URL = './programa.html';

const DEST_EMOJI = {
  florianopolis:'🏖️', gramado:'🌲', ferrugem:'🌊', camboriu:'🎡',
  bombinhas:'🐚', capao:'🏄', torres:'⛵', laguna:'🦀',
  praiarosa:'🌹', blumenau:'🌸',
  buenosaires:'🏙️', mendoza:'🍷', norte:'🏔️', carlospaz:'⛰️', bariloche:'🏔️',
  cataratas:'🌊', chile:'🇨🇱', mendozasantiago:'🏔️',
};
const PAIS_ORDER = ['Brasil','Argentina','Cataratas','Chile','Otros'];
const PAIS_EMOJI = { Brasil:'🇧🇷', Argentina:'🇦🇷', Cataratas:'💧', Chile:'🇨🇱', Otros:'🌍' };

function titleCase(s) {
  return s.toLowerCase().replace(/(?:^|\s|[-\/])\S/g, c => c.toUpperCase());
}
function formatDate(iso) {
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleDateString('es-UY',{day:'2-digit',month:'short',year:'numeric'});
}

function groupData(programas) {
  const byPais = {};
  for (const p of programas) {
    const pais = p.pais || 'Otros', dest = p.destino || 'Otros';
    if (!byPais[pais]) byPais[pais] = {};
    if (!byPais[pais][dest]) byPais[pais][dest] = {
      slug: p.destinoSlug, emoji: DEST_EMOJI[p.destinoSlug] || '📍', progs: []
    };
    byPais[pais][dest].progs.push(p);
  }
  return byPais;
}

function sorted(byPais) {
  return Object.keys(byPais).sort((a,b) => {
    const ia = PAIS_ORDER.indexOf(a), ib = PAIS_ORDER.indexOf(b);
    return (ia<0?99:ia) - (ib<0?99:ib);
  });
}

function cardHTML(p) {
  const dias   = p.duracion ? p.duracion.split('—')[0].trim() : '';
  const salida = p.fechas?.find(f => f.gold)?.value || p.fechas?.[0]?.value || '';
  const sub    = p.fechas?.find(f => f.label==='Salidas' && !f.gold)?.value || salida;
  return `
    <a class="prog-card" href="${PROG_URL}?p=${encodeURIComponent(p.id)}" target="_blank">
      <div class="card-body">
        <div class="card-name">${titleCase(p.titulo)}</div>
        <div class="card-sub">${sub}</div>
        <div class="card-tags">
          ${dias ? `<span class="tag tag-dur">${dias}</span>` : ''}
          <span class="tag tag-bus">Bus semi cama</span>
          ${salida ? `<span class="tag tag-seas">${salida.substring(0,28)}</span>` : ''}
        </div>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>`;
}

function renderSidebar(byPais) {
  let h = '';
  sorted(byPais).forEach((pais, pi) => {
    h += `<div class="tree-country">${PAIS_EMOJI[pais]||'🌍'} ${pais}</div>`;
    Object.entries(byPais[pais]).forEach(([dest, info], di) => {
      const open = (pi===0 && di===0) ? ' open' : '';
      const sid = `td-${info.slug}`;
      h += `
        <div class="tree-dest${open}" id="${sid}">
          <div class="tree-dest-hd" onclick="toggleTree('${sid}')">
            <span>${info.emoji}</span>${dest}
            <svg class="chev" viewBox="0 0 16 16"><path d="M6 4l4 4-4 4"/></svg>
          </div>
          <div class="tree-links">
            ${info.progs.map(p => {
              const label = titleCase(p.titulo)
                .replace(new RegExp(`^${dest.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\\s*[-–]?\\s*`,'i'),'')
                .trim() || titleCase(p.titulo);
              return `<a class="tree-link" href="${PROG_URL}?p=${encodeURIComponent(p.id)}" target="_blank">${label}</a>`;
            }).join('')}
          </div>
        </div>`;
    });
  });
  document.getElementById('sidebar-tree').innerHTML = h;
}

function renderContent(byPais) {
  let h = '';
  sorted(byPais).forEach(pais => {
    h += `<div class="country-block">`;
    h += `<div class="country-label">${PAIS_EMOJI[pais]||'🌍'} ${pais}</div>`;
    Object.entries(byPais[pais]).forEach(([dest, info]) => {
      h += `
        <div class="dest-block" id="dest-${info.slug}">
          <div class="dest-label">
            <div class="dest-icon">${info.emoji}</div>
            <h3>${dest}</h3>
            <span class="dest-count">${info.progs.length} programa${info.progs.length!==1?'s':''}</span>
          </div>
          <div class="prog-list">${info.progs.map(cardHTML).join('')}</div>
        </div>`;
    });
    h += `</div>`;
  });
  document.getElementById('main-content').innerHTML = h || `
    <div class="state-box">
      <span class="ico">⚠️</span>
      <p>No se encontraron programas.<br>
      Verificá que <code>programas-sendas.json</code> existe y tiene contenido.<br>
      Hacé click en <strong>Actualizar ahora</strong> para regenerarlo.</p>
    </div>`;
}

async function init() {
  try {
    const r = await fetch(`${DATA_URL}?_=${Date.now()}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    document.getElementById('last-update').textContent = formatDate(data.updatedAt);
    document.getElementById('prog-count').textContent  = data.programas.length;

    if (!data.programas?.length) throw new Error('Sin programas en el JSON');

    const byPais = groupData(data.programas);
    renderSidebar(byPais);
    renderContent(byPais);
  } catch(e) {
    document.getElementById('last-update').textContent = 'error';
    document.getElementById('sidebar-tree').innerHTML =
      `<div style="padding:14px 16px;color:#b00;font-size:.76rem;">Error al cargar</div>`;
    document.getElementById('main-content').innerHTML = `
      <div class="state-box">
        <span class="ico">⚠️</span>
        <p>No se pudo cargar el catálogo.<br>
        <strong>Error:</strong> ${e.message}<br><br>
        Verificá que <code>programas-sendas.json</code> existe y ejecutá el scraper
        desde <strong>Actualizar ahora</strong>.</p>
      </div>`;
  }
}

function toggleTree(id) { document.getElementById(id)?.classList.toggle('open'); }

init();
</script>
</body>
</html>
