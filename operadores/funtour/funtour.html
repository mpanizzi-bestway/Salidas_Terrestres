<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funtour — Programas | BestWay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:       #2d3a6b;
      --navy-dark:  #1e2748;
      --navy-mid:   #3d4f8a;
      --accent:     #4a5faa;
      --gold:       #c8a84b;
      --gold-lt:    #e8c96a;
      --fun:        #e8630a;
      --fun-dark:   #b84d08;
      --fun-lt:     #ff8c42;
      --fun-bg:     #fff4ee;
      --white:      #ffffff;
      --off-white:  #f4f3ef;
      --gray-light: #eeedf0;
      --gray:       #9a98a8;
      --text:       #1a1a2e;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--off-white); color:var(--text); min-height:100vh; }

    /* HEADER */
    header { background:var(--navy-dark); border-bottom:3px solid var(--fun); }
    .header-inner { max-width:1140px; margin:0 auto; padding:16px 32px; display:flex; align-items:center; gap:20px; }
    .back-btn { display:flex; align-items:center; gap:6px; color:rgba(255,255,255,.55); text-decoration:none; font-size:.8rem; font-weight:500; transition:color .2s; white-space:nowrap; }
    .back-btn:hover { color:var(--fun-lt); }
    .back-btn svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
    .h-div { width:1px; height:36px; background:rgba(255,255,255,.12); }
    .logo-wrap img { height:40px; width:auto; display:block; }
    .header-title { font-family:'Poppins',sans-serif; font-size:.95rem; font-weight:600; color:white; }
    .header-title span { color:var(--fun-lt); font-weight:400; font-size:.82rem; margin-left:6px; opacity:.9; }

    /* UPDATE BAR */
    .update-bar { background:var(--fun-dark); padding:8px 32px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .update-info { font-size:.75rem; color:rgba(255,255,255,.85); display:flex; align-items:center; gap:6px; }
    .update-info strong { color:white; }
    .btn-update { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:white; padding:5px 16px; border-radius:5px; font-family:'DM Sans',sans-serif; font-size:.75rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .2s; text-decoration:none; white-space:nowrap; }
    .btn-update:hover { background:rgba(255,255,255,.25); }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { display:inline-block; animation:spin 1s linear infinite; }

    /* LAYOUT */
    .layout { max-width:1140px; margin:28px auto 64px; padding:0 32px; display:grid; grid-template-columns:240px 1fr; gap:28px; align-items:start; }

    /* SIDEBAR */
    .sidebar { background:var(--white); border-radius:10px; border:1px solid rgba(30,39,72,.09); box-shadow:0 2px 10px rgba(30,39,72,.05); overflow:hidden; position:sticky; top:16px; }
    .sidebar-logo { background:var(--navy-dark); padding:14px 18px 12px; display:flex; align-items:center; justify-content:center; border-bottom:2px solid var(--fun); min-height:64px; }
    .sidebar-logo img { height:36px; width:auto; max-width:160px; object-fit:contain; }
    .sidebar-logo .logo-txt { color:white; font-family:'Poppins',sans-serif; font-size:1rem; font-weight:700; letter-spacing:.02em; }
    .sidebar-hd { background:var(--navy); padding:11px 18px; color:white; font-size:.72rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
    .tree { padding:8px 0 4px; }
    .tree-country { padding:10px 18px 5px; font-size:.67rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); display:flex; align-items:center; gap:8px; }
    .tree-country::after { content:''; flex:1; height:1px; background:var(--gray-light); }
    .tree-dest-hd { padding:6px 18px; font-size:.82rem; font-weight:600; color:var(--navy); cursor:pointer; display:flex; align-items:center; gap:7px; transition:background .12s; user-select:none; }
    .tree-dest-hd:hover { background:var(--gray-light); }
    .tree-dest-hd .chev { margin-left:auto; width:13px; height:13px; fill:none; stroke:var(--gray); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:transform .18s; }
    .tree-dest.open .chev { transform:rotate(90deg); }
    .tree-links { display:none; padding:0 0 3px 34px; }
    .tree-dest.open .tree-links { display:block; }
    .tree-link { display:block; padding:4px 12px 4px 10px; font-size:.75rem; color:var(--accent); text-decoration:none; border-left:2px solid var(--gray-light); margin:1px 0; line-height:1.35; transition:border-color .12s,color .12s; }
    .tree-link:hover { color:var(--navy); border-color:var(--fun); }

    /* CONTENT */
    .content { display:flex; flex-direction:column; gap:32px; }
    .country-block { display:flex; flex-direction:column; gap:24px; }
    .country-label { font-family:'Poppins',sans-serif; font-size:1rem; font-weight:700; color:var(--navy); display:flex; align-items:center; gap:10px; padding-bottom:9px; border-bottom:2px solid var(--navy); }
    .country-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--fun) 0%,transparent 80%); margin-top:1px; }
    .dest-block { display:flex; flex-direction:column; gap:7px; }
    .dest-label { display:flex; align-items:center; gap:10px; padding-bottom:8px; border-bottom:1px solid var(--gray-light); }
    .dest-icon { width:32px; height:32px; background:var(--navy); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.95rem; flex-shrink:0; }
    .dest-label h3 { font-family:'Poppins',sans-serif; font-size:.95rem; font-weight:600; color:var(--navy); }
    .dest-count { margin-left:auto; font-size:.68rem; color:var(--gray); background:var(--gray-light); padding:2px 9px; border-radius:12px; }
    .prog-list { display:flex; flex-direction:column; gap:6px; }

    /* CARD */
    .prog-card { background:var(--white); border-radius:8px; border:1px solid rgba(30,39,72,.08); padding:12px 15px; display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit; box-shadow:0 1px 3px rgba(30,39,72,.05); transition:border-color .18s,box-shadow .18s,transform .14s; }
    .prog-card:hover { border-color:var(--fun); box-shadow:0 3px 14px rgba(232,99,10,.12); transform:translateX(3px); }
    .card-thumb { width:48px; height:48px; border-radius:6px; object-fit:cover; flex-shrink:0; background:var(--gray-light); }
    .card-body { flex:1; min-width:0; }
    .card-name { font-size:.88rem; font-weight:600; color:var(--navy); line-height:1.3; }
    .card-sub  { font-size:.73rem; color:var(--gray); margin-top:2px; }
    .card-tags { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
    .tag { font-size:.67rem; font-weight:500; padding:1px 7px; border-radius:10px; }
    .tag-dur    { background:#e8edf8; color:var(--navy-mid); }
    .tag-precio { background:var(--fun-bg); color:var(--fun-dark); font-weight:600; }
    .tag-seas   { background:#fdf5e4; color:#8a6010; }
    .card-arrow { width:27px; height:27px; background:var(--gray-light); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .18s; }
    .prog-card:hover .card-arrow { background:var(--fun); }
    .card-arrow svg { width:11px; height:11px; fill:none; stroke:var(--navy); stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:stroke .18s; }
    .prog-card:hover .card-arrow svg { stroke:white; }

    /* STATE */
    .state-box { text-align:center; padding:48px 20px; color:var(--gray); background:var(--white); border-radius:10px; border:1px solid rgba(30,39,72,.08); }
    .state-box .ico { font-size:1.8rem; display:block; margin-bottom:10px; }
    .state-box p { font-size:.84rem; line-height:1.7; }

    footer { background:var(--navy-dark); padding:16px 32px; text-align:center; }
    footer p { color:rgba(255,255,255,.28); font-size:.74rem; }
    footer span { color:var(--fun-lt); }

    @media(max-width:740px) {
      .layout { grid-template-columns:1fr; padding:0 16px; }
      .sidebar { position:static; }
      .header-inner,.update-bar { padding-left:16px; padding-right:16px; }
      .update-bar { flex-direction:column; align-items:flex-start; gap:8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../../index.html" class="back-btn">
      <svg viewBox="0 0 16 16"><path d="M10 3L5 8l5 5"/></svg>
      Inicio
    </a>
    <div class="h-div"></div>
    <div class="logo-wrap">
      <img src="../../images/logo_Bestway_blanco.png" alt="BestWay"
           onerror="this.style.display='none'">
    </div>
    <div class="header-title">
      Funtour
      <span>— Excursiones terrestres y aéreas</span>
    </div>
  </div>
</header>

<div class="update-bar">
  <div class="update-info">
    🔄 Actualizado: <strong id="last-update">—</strong>
    &nbsp;·&nbsp; <span id="prog-count">—</span> programas activos
  </div>
  <a href="https://github.com/mpanizzi-bestway/Salidas_Terrestres/actions/workflows/scrape-funtour.yml"
     target="_blank" class="btn-update">
    Actualizar ahora
  </a>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../../images/logo_funtour.png" alt="Funtour"
           onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\'logo-txt\'>Funtour</span>')">
    </div>
    <div class="sidebar-hd">Destinos &amp; Programas</div>
    <div class="tree" id="sidebar-tree">
      <div style="padding:20px 16px;text-align:center;color:var(--gray);font-size:.8rem;">
        <span class="spin">⏳</span> Cargando...
      </div>
    </div>
  </aside>

  <main class="content" id="main-content">
    <div class="state-box">
      <span class="ico spin">⏳</span>
      <p>Cargando programas de Funtour...</p>
    </div>
  </main>
</div>

<footer>
  <p><span>BestWay Viajes</span> · Funtour · Uso interno</p>
</footer>

<script>
const DATA_URL = '../../programas-funtour.json';
const PROG_URL = './programa-funtour.html';

const DEST_EMOJI = {
  cataratas:'🌊', florianopolis:'🏖️', gramado:'🌲', camboriu:'🎡',
  rio:'🏙️', machadinho:'♨️', bariloche:'🏔️', mendoza:'🍷',
  carlospaz:'⛰️', buenosaires:'🏙️', chile:'🇨🇱', otro:'📍',
};
const DEST_LABELS = {
  cataratas:'Cataratas del Iguazú', florianopolis:'Florianópolis / Costa',
  gramado:'Gramado y Canela', camboriu:'Camboriú',
  rio:'Río de Janeiro', machadinho:'Termas Machadinho',
  bariloche:'Bariloche', mendoza:'Mendoza / Chile',
  carlospaz:'Carlos Paz', buenosaires:'Buenos Aires',
  chile:'Chile / Santiago', otro:'Otros destinos',
};
const PAIS_ORDER = ['Brasil','Argentina','Chile','Otros'];
const PAIS_EMOJI = { Brasil:'🇧🇷', Argentina:'🇦🇷', Chile:'🇨🇱', Otros:'🌍' };

function titleCase(s) {
  return s.toLowerCase().replace(/(?:^|\s|[-\/])\S/g, c => c.toUpperCase());
}
function formatDate(iso) {
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleDateString('es-UY',{day:'2-digit',month:'short',year:'numeric'});
}
function groupData(programas) {
  const byPais = {};
  for (const p of programas) {
    const pais = p.pais || 'Otros';
    const slug = p.destinoSlug || 'otro';
    if (!byPais[pais]) byPais[pais] = {};
    if (!byPais[pais][slug]) byPais[pais][slug] = {
      slug, emoji: DEST_EMOJI[slug]||'📍',
      label: DEST_LABELS[slug]||titleCase(slug), progs:[]
    };
    byPais[pais][slug].progs.push(p);
  }
  return byPais;
}
function sorted(byPais) {
  return Object.keys(byPais).sort((a,b)=>{
    const ia=PAIS_ORDER.indexOf(a), ib=PAIS_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
}
function cardHTML(p) {
  const salida   = p.salidas?.[0] || '';
  const duracion = p.duracion || '';
  const precio   = p.precioDesde ? `Desde U$S ${p.precioDesde}` : '';
  const temp     = p.temporada || '';
  return `
    <a class="prog-card" href="${PROG_URL}?p=${encodeURIComponent(p.id)}" target="_blank">
      ${p.imagen ? `<img class="card-thumb" src="${p.imagen}" alt="${p.titulo}" onerror="this.style.display='none'">` : ''}
      <div class="card-body">
        <div class="card-name">${p.titulo}</div>
        <div class="card-sub">${salida || 'Consultar salida'}</div>
        <div class="card-tags">
          ${duracion ? `<span class="tag tag-dur">${duracion}</span>` : ''}
          ${precio   ? `<span class="tag tag-precio">${precio}</span>` : ''}
          ${temp     ? `<span class="tag tag-seas">${temp}</span>` : ''}
        </div>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>`;
}
function renderSidebar(byPais) {
  let h = '';
  sorted(byPais).forEach((pais, pi) => {
    h += `<div class="tree-country">${PAIS_EMOJI[pais]||'🌍'} ${pais}</div>`;
    Object.entries(byPais[pais]).forEach(([slug, info], di) => {
      const open = (pi===0 && di===0) ? ' open' : '';
      const sid  = `td-${slug}`;
      h += `<div class="tree-dest${open}" id="${sid}">
        <div class="tree-dest-hd" onclick="toggleTree('${sid}')">
          <span>${info.emoji}</span>${info.label}
          <svg class="chev" viewBox="0 0 16 16"><path d="M6 4l4 4-4 4"/></svg>
        </div>
        <div class="tree-links">
          ${info.progs.map(p=>`<a class="tree-link" href="${PROG_URL}?p=${encodeURIComponent(p.id)}" target="_blank">${p.titulo}</a>`).join('')}
        </div>
      </div>`;
    });
  });
  document.getElementById('sidebar-tree').innerHTML = h;
}
function renderContent(byPais) {
  let h = '';
  sorted(byPais).forEach(pais => {
    h += `<div class="country-block"><div class="country-label">${PAIS_EMOJI[pais]||'🌍'} ${pais}</div>`;
    Object.entries(byPais[pais]).forEach(([slug, info]) => {
      h += `<div class="dest-block" id="dest-${slug}">
        <div class="dest-label">
          <div class="dest-icon">${info.emoji}</div>
          <h3>${info.label}</h3>
          <span class="dest-count">${info.progs.length} programa${info.progs.length!==1?'s':''}</span>
        </div>
        <div class="prog-list">${info.progs.map(cardHTML).join('')}</div>
      </div>`;
    });
    h += `</div>`;
  });
  document.getElementById('main-content').innerHTML = h || `
    <div class="state-box"><span class="ico">⚠️</span>
    <p>No se encontraron programas.<br>Ejecutá el scraper desde <strong>Actualizar ahora</strong>.</p></div>`;
}
async function init() {
  try {
    const r = await fetch(`${DATA_URL}?_=${Date.now()}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    document.getElementById('last-update').textContent = formatDate(data.updatedAt);
    document.getElementById('prog-count').textContent  = data.programas.length;
    if (!data.programas?.length) throw new Error('Sin programas');
    const byPais = groupData(data.programas);
    renderSidebar(byPais);
    renderContent(byPais);
  } catch(e) {
    document.getElementById('last-update').textContent = 'error';
    document.getElementById('sidebar-tree').innerHTML =
      `<div style="padding:14px 16px;color:#b00;font-size:.76rem;">Error al cargar</div>`;
    document.getElementById('main-content').innerHTML = `
      <div class="state-box"><span class="ico">⚠️</span>
      <p>No se pudo cargar el catálogo.<br><strong>Error:</strong> ${e.message}<br><br>
      Ejecutá el scraper desde <strong>Actualizar ahora</strong>.</p></div>`;
  }
}
function toggleTree(id) { document.getElementById(id)?.classList.toggle('open'); }
init();
</script>
</body>
</html>
