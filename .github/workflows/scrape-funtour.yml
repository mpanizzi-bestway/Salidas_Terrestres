name: Scrape Funtour

on:
  schedule:
    # Lunes 9:00 AM UTC (escalonado después de Sendas y Mtur)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: operadores/funtour/package-lock.json

      - name: Install dependencies
        working-directory: operadores/funtour
        run: npm ci

      - name: Run scraper
        run: node operadores/funtour/scraper-funtour.js

      - name: Commit JSON actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add programas-funtour.json
          git diff --staged --quiet || git commit -m "chore: actualizar programas-funtour.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
