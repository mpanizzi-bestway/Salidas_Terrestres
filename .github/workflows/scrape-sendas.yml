name: Scrape Sendas Turismo

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razon del scraping manual'
        required: false
        default: 'Actualizacion manual de programas'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run scraper
        run: node operadores/sendas/scraper.js

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions - Sendas Scraper"
          git add programas-sendas.json
          git diff --staged --quiet || git commit -m "Auto-update: Sendas Turismo programs [$(date +'%Y-%m-%d')]"
          git push
